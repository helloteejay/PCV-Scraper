name: Check StuyTown Availability

# NOTE: GitHub only fires `schedule` triggers from the repository's DEFAULT
# branch. The cron below won't run until this workflow is on `main`. You can,
# however, run it any time from the Actions tab via "Run workflow"
# (workflow_dispatch), which is how we validate it before merging.

on:
  schedule:
    # Times are UTC. We run a broad window and let main.py enforce the exact
    # "Tue–Sat, 7am–9pm ET" window (handles DST + day boundaries correctly).
    - cron: "*/30 11-23 * * *"   # ~7am–7pm ET
    - cron: "*/30 0-2 * * *"     # ~7pm–9pm ET (next UTC day)
  workflow_dispatch:
    inputs:
      ignore_window:
        description: "Run even if outside the Tue–Sat 7am–9pm ET window"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: stuytown-availability
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run availability check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Manual runs ignore the time window by default so you can test anytime.
          ENFORCE_ACTIVE_WINDOW: ${{ (github.event_name == 'workflow_dispatch' && inputs.ignore_window) && '0' || '1' }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "stuytown-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update seen-units state [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 7
