name: Check StuyTown Availability

# NOTE: GitHub only fires `schedule` triggers from the repository's DEFAULT
# branch. The cron below won't run until this workflow is on `main`. You can,
# however, run it any time from the Actions tab via "Run workflow"
# (workflow_dispatch), which is how we validate it before merging.

on:
  schedule:
    # Times are UTC. We run a broad window and let main.py enforce the exact
    # "Tue–Sat, 7am–9pm ET" window (handles DST + day boundaries correctly).
    - cron: "*/30 11-23 * * *"   # ~7am–7pm ET
    - cron: "*/30 0-2 * * *"     # ~7pm–9pm ET (next UTC day)
  workflow_dispatch:
    inputs:
      ignore_window:
        description: "Run even if outside the Tue–Sat 7am–9pm ET window"
        type: boolean
        default: true
      send_test_message:
        description: "Just send a Telegram test message and exit"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: stuytown-availability
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Persist "units we've already alerted on" across runs WITHOUT committing
      # to the repo. The unique key forces a save every run; restore-keys pulls
      # the most recent prior state. Runs are serialized (concurrency group)
      # so the state evolves cleanly.
      - name: Restore seen-units state
        uses: actions/cache@v4
        with:
          path: state/seen.json
          key: seen-state-${{ github.run_id }}
          restore-keys: |
            seen-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run availability check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Manual runs ignore the time window by default so you can test anytime.
          ENFORCE_ACTIVE_WINDOW: ${{ (github.event_name == 'workflow_dispatch' && inputs.ignore_window) && '0' || '1' }}
          TELEGRAM_TEST: ${{ (github.event_name == 'workflow_dispatch' && inputs.send_test_message) && '1' || '0' }}
        run: python main.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 7
